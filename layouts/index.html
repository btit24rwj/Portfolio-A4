{{ define "main" }}
  <h2>Welcome</h2>
  <p>{{ .Site.Params.description }}</p>

  <h3>Latest Posts</h3>
  {{ range first 5 (where .Site.RegularPages "Section" "posts") }}
    <article>
      <h4><a href="{{ .RelPermalink }}">{{ .Title }}</a></h4>
      <p class="meta">{{ .Date.Format "02 Jan 2006" }}</p>
      <p>{{ .Summary }}</p>
    </article>
  {{ end }}
{{ end }}
